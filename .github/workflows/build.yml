name: 🤖 Build DroidClaw APK

on:
  push:
    branches: [main, master, develop]
    tags: ['v*']
  pull_request:
    branches: [main, master]

# Cancel in-progress runs for the same branch/PR
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: 🔨 Build & Test
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Needed for releases

    steps:
      # ─────────────────────────────────────────
      # 📂 Checkout
      # ─────────────────────────────────────────
      - name: 📂 Checkout Code
        uses: actions/checkout@v4

      # ─────────────────────────────────────────
      # ☕ Java Setup
      # ─────────────────────────────────────────
      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # ─────────────────────────────────────────
      # 💙 Flutter Setup
      # ─────────────────────────────────────────
      - name: 💙 Setup Flutter 3.x
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
          cache: true  # Cache Flutter SDK for faster builds ⚡

      # ─────────────────────────────────────────
      # 📦 Dependencies
      # ─────────────────────────────────────────
      - name: 📦 Get Dependencies
        run: flutter pub get

      # ─────────────────────────────────────────
      # 🔨 Generate Code
      # ─────────────────────────────────────────
      - name: 🔨 Generate Code (build_runner)
        run: |
          echo "Running build_runner to generate .g.dart files..."
          dart run build_runner build --delete-conflicting-outputs 2>&1 || echo "build_runner had issues (may be OK)"
      # ─────────────────────────────────────────
      - name: 🔍 Analyze Code
        run: flutter analyze --no-fatal-infos
        continue-on-error: true  # Don't fail on warnings

      # ─────────────────────────────────────────
      # 🧪 Run Tests
      # ─────────────────────────────────────────
      - name: 🧪 Run Tests
        run: flutter test
        continue-on-error: true  # Don't fail if no tests yet

      # ─────────────────────────────────────────
      # 🔧 Debug: Check Android project structure
      # ─────────────────────────────────────────
      - name: 🔧 Debug Android Structure
        run: |
          echo "=== Android directory ==="
          find android -type f | head -50
          echo "=== Gradle wrapper ==="
          ls -la android/gradle/wrapper/ 2>/dev/null || echo "NO wrapper dir"
          echo "=== Assets ==="
          ls -la assets/ 2>/dev/null || echo "NO assets dir"
          echo "=== Config ==="
          ls -la config/ 2>/dev/null || echo "NO config dir"
          echo "=== Flutter doctor ==="
          flutter doctor -v

      # ─────────────────────────────────────────
      # 🏗️ Build APK (fat APK - all architectures)
      # ─────────────────────────────────────────
      - name: 🏗️ Build Release APK
        run: |
          flutter build apk --release 2>&1 | tee build-output.log || true
          echo "=== BUILD EXIT CODE: $? ==="
          echo "=== LAST 100 LINES OF BUILD LOG ==="
          tail -100 build-output.log

      - name: 📋 Upload Build Log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build-output.log
          retention-days: 5

      # ─────────────────────────────────────────
      # 📊 Build Info
      # ─────────────────────────────────────────
      - name: 📊 APK Info
        run: |
          echo "📱 APK built successfully!"
          echo "🔍 Looking for APK files..."
          find build -name "*.apk" -exec ls -lh {} \; 2>/dev/null || echo "Searching wider..."
          find . -name "app-release.apk" -exec ls -lh {} \; 2>/dev/null
          APK_PATH=$(find build -name "app-release.apk" -type f 2>/dev/null | head -1)
          if [ -n "$APK_PATH" ]; then
            echo "📦 Size: $(du -h "$APK_PATH" | cut -f1)"
            echo "📍 Path: $APK_PATH"
            ls -lh "$(dirname "$APK_PATH")"
          else
            echo "⚠️ APK not found at expected path, listing outputs..."
            find build/app/outputs -type f 2>/dev/null || echo "No outputs dir"
          fi

      # ─────────────────────────────────────────
      # 📤 Upload APK as artifact (for PRs & branch pushes)
      # ─────────────────────────────────────────
      - name: 📤 Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: droidclaw-apk-${{ github.sha }}
          path: |
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/release/app-release.apk
          retention-days: 30
          if-no-files-found: warn

      # ─────────────────────────────────────────
      # 🚀 Create Release (only on tag push)
      # ─────────────────────────────────────────
      - name: 🚀 Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/**/*.apk
          tag_name: ${{ github.ref_name }}
          name: "🤖 DroidClaw ${{ github.ref_name }}"
          body: |
            ## 🤖 DroidClaw ${{ github.ref_name }}

            ### 📱 Download
            Download the APK below and install on your Android device (5.0+).

            ### 📋 Requirements
            - Android 5.0+ (API 21+)
            - ~50MB storage

            ### 🔧 Install
            1. Download the APK below
            2. Enable "Install from unknown sources" on your phone
            3. Open the APK to install
            4. Launch DroidClaw and configure your AI provider!
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─────────────────────────────────────────────
  # 🔨 Split APKs Build (for smaller downloads)
  # ─────────────────────────────────────────────
  build-split:
    name: 🔨 Build Split APKs
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: 📂 Checkout Code
        uses: actions/checkout@v4

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 💙 Setup Flutter 3.x
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
          cache: true

      - name: 📦 Get Dependencies
        run: flutter pub get

      - name: 🏗️ Build Split APKs
        run: flutter build apk --release --split-per-abi

      - name: 📤 Upload Split APKs
        uses: actions/upload-artifact@v4
        with:
          name: droidclaw-split-apks
          path: |
            build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
            build/app/outputs/flutter-apk/app-x86_64-release.apk
          retention-days: 30

      - name: 🚀 Upload Split APKs to Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/**/*.apk
          tag_name: ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
