name: Auto Release DroidClaw 🤖🚀
on:
  push:
    tags:
      - 'v*' # This triggers when you push a tag like v1.0, v2.1, etc. 🏷️✨

jobs:
  release:
    runs-on: ubuntu-latest
    permissions: # This gives GitHub permission to create the release! 🔑
      contents: write
    steps:
      - name: Checkout Code 📂
        uses: actions/checkout@v4

      - name: Setup Java ☕
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter 💙
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'

      - name: Get Dependencies 📥
        run: flutter pub get

      - name: Build APK 🛠️
        run: flutter build apk --release

      - name: Create GitHub Release 🎈
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/flutter-apk/app-release.apk
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # Built-in magic token! 🪄
