name: 🤖 Build DroidClaw APK

on:
  push:
    branches: [main, master, develop]
    tags: ['v*']
  pull_request:
    branches: [main, master]

# Cancel in-progress runs for the same branch/PR
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: 🔨 Build & Test
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Needed for releases

    steps:
      # ─────────────────────────────────────────
      # 📂 Checkout
      # ─────────────────────────────────────────
      - name: 📂 Checkout Code
        uses: actions/checkout@v4

      # ─────────────────────────────────────────
      # ☕ Java Setup
      # ─────────────────────────────────────────
      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # ─────────────────────────────────────────
      # 💙 Flutter Setup
      # ─────────────────────────────────────────
      - name: 💙 Setup Flutter 3.x
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
          cache: true  # Cache Flutter SDK for faster builds ⚡

      # ─────────────────────────────────────────
      # 📦 Dependencies
      # ─────────────────────────────────────────
      - name: 📦 Get Dependencies
        run: flutter pub get

      # ─────────────────────────────────────────
      # 🔍 Analyze Code
      # ─────────────────────────────────────────
      - name: 🔍 Analyze Code
        run: flutter analyze --no-fatal-infos
        continue-on-error: true  # Don't fail on warnings

      # ─────────────────────────────────────────
      # 🧪 Run Tests
      # ─────────────────────────────────────────
      - name: 🧪 Run Tests
        run: flutter test
        continue-on-error: true  # Don't fail if no tests yet

      # ─────────────────────────────────────────
      # 🏗️ Build APK (fat APK - all architectures)
      # ─────────────────────────────────────────
      - name: 🏗️ Build Release APK
        run: flutter build apk --release

      # ─────────────────────────────────────────
      # 📊 Build Info
      # ─────────────────────────────────────────
      - name: 📊 APK Info
        run: |
          echo "📱 APK built successfully!"
          echo "📦 Size: $(du -h build/app/outputs/flutter-apk/app-release.apk | cut -f1)"
          echo "📍 Path: build/app/outputs/flutter-apk/app-release.apk"
          ls -lh build/app/outputs/flutter-apk/

      # ─────────────────────────────────────────
      # 📤 Upload APK as artifact (for PRs & branch pushes)
      # ─────────────────────────────────────────
      - name: 📤 Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: droidclaw-apk-${{ github.sha }}
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30  # Keep for 30 days
          if-no-files-found: error

      # ─────────────────────────────────────────
      # 🚀 Create Release (only on tag push)
      # ─────────────────────────────────────────
      - name: 🚀 Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/flutter-apk/app-release.apk
          tag_name: ${{ github.ref_name }}
          name: "🤖 DroidClaw ${{ github.ref_name }}"
          body: |
            ## 🤖 DroidClaw ${{ github.ref_name }}

            ### 📱 Download
            Download the APK below and install on your Android device (5.0+).

            ### ✨ What's New
            - See [changelog](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md)

            ### 📋 Requirements
            - Android 5.0+ (API 21+)
            - ~50MB storage

            ### 🔧 Install
            1. Download `app-release.apk` below
            2. Enable "Install from unknown sources" on your phone
            3. Open the APK to install
            4. Launch DroidClaw and configure your AI provider!
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─────────────────────────────────────────────
  # 🔨 Split APKs Build (for smaller downloads)
  # ─────────────────────────────────────────────
  build-split:
    name: 🔨 Build Split APKs
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: 📂 Checkout Code
        uses: actions/checkout@v4

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 💙 Setup Flutter 3.x
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
          cache: true

      - name: 📦 Get Dependencies
        run: flutter pub get

      - name: 🏗️ Build Split APKs
        run: flutter build apk --release --split-per-abi

      - name: 📤 Upload Split APKs
        uses: actions/upload-artifact@v4
        with:
          name: droidclaw-split-apks
          path: |
            build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
            build/app/outputs/flutter-apk/app-x86_64-release.apk
          retention-days: 30

      - name: 🚀 Upload Split APKs to Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
            build/app/outputs/flutter-apk/app-x86_64-release.apk
          tag_name: ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
